<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Sort: Misi Penyelamatan Bumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: #f0fdf4;
            user-select: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .bin {
            width: 120px;
            height: 150px;
            border-radius: 10px 10px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .bin:active {
            transform: scale(0.95);
        }

        .bin-organik { background: #22c55e; border: 4px solid #166534; }
        .bin-anorganik { background: #3b82f6; border: 4px solid #1e40af; }
        .bin-b3 { background: #ef4444; border: 4px solid #991b1b; }

        .waste-item {
            position: absolute;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            touch-action: none;
        }

        .score-board {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .progress-bar {
            width: 200px;
            height: 15px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #10b981;
            transition: width 0.3s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .floating { animation: float 3s ease-in-out infinite; }

        #game-over {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }

        .notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 250px;
            z-index: 500;
        }

        .notif.active { transform: translateX(0); }
    </style>
</head>
<body>

    <div class="score-board">
        <div class="text-sm font-bold text-gray-500">MISI EKOLOGI</div>
        <div class="text-2xl font-extrabold text-green-600">Skor: <span id="score">0</span>/100</div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="game-container" id="game-area">
        <h1 class="mt-24 text-center px-4 text-green-800 font-bold text-lg md:text-2xl">
            Tarik Sampah ke Tempat yang Benar! 🌍
        </h1>

        <!-- Tong Sampah -->
        <div class="flex gap-4 md:gap-12 absolute bottom-10">
            <div class="bin bin-organik" id="organik" data-type="organik">
                <span>ORGANIK</span>
            </div>
            <div class="bin bin-anorganik" id="anorganik" data-type="anorganik">
                <span>ANORGANIK</span>
            </div>
            <div class="bin bin-b3" id="b3" data-type="b3">
                <span>B3</span>
            </div>
        </div>
    </div>

    <div id="game-over">
        <h2 class="text-5xl font-black mb-4">MISI SELESAI! 🎉</h2>
        <p class="text-xl mb-8 px-6">Luar biasa! Kamu telah mengamankan bumi dari 100 sampah berbahaya.</p>
        <button onclick="location.reload()" class="bg-green-500 hover:bg-green-600 px-8 py-3 rounded-full font-bold text-lg transition">Main Lagi</button>
    </div>

    <div id="notification" class="notif">
        <div class="flex items-start gap-3">
            <span id="notif-icon" class="text-2xl">💡</span>
            <div>
                <div class="font-bold text-sm" id="notif-title">Tahukah Kamu?</div>
                <div class="text-xs text-gray-600 mt-1" id="notif-body">Fakta edukasi muncul di sini.</div>
            </div>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const progressFill = document.getElementById('progress-fill');
        const gameOverScreen = document.getElementById('game-over');
        const notification = document.getElementById('notification');
        
        let score = 0;
        const targetScore = 100;

        const wasteTypes = [
            { name: 'Apel Busuk', emoji: '🍎', type: 'organik', info: 'Sampah organik bisa diolah menjadi pupuk kompos untuk tanaman.' },
            { name: 'Daun Kering', emoji: '🍂', type: 'organik', info: 'Daun kering mengandung karbon tinggi, bagus untuk bahan dasar kompos.' },
            { name: 'Kulit Pisang', emoji: '🍌', type: 'organik', info: 'Kulit pisang cepat terurai secara alami dalam hitungan hari.' },
            { name: 'Tulang Ikan', emoji: '🐟', type: 'organik', info: 'Sisa makanan organik menghasilkan gas metana jika tidak dikelola dengan baik.' },
            
            { name: 'Botol Plastik', emoji: '🍼', type: 'anorganik', info: 'Plastik membutuhkan waktu hingga 450 tahun untuk terurai di laut.' },
            { name: 'Kaleng Minuman', emoji: '🥫', type: 'anorganik', info: 'Aluminium dapat didaur ulang berkali-kali tanpa menurunkan kualitasnya.' },
            { name: 'Kardus Bekas', emoji: '📦', type: 'anorganik', info: 'Mendaur ulang 1 ton kertas dapat menyelamatkan sekitar 17 pohon.' },
            { name: 'Gelas Kaca', emoji: '🥂', type: 'anorganik', info: 'Kaca adalah material yang 100% dapat didaur ulang selamanya.' },

            { name: 'Baterai Bekas', emoji: '🔋', type: 'b3', info: 'Baterai mengandung logam berat seperti merkuri dan kadmium yang beracun.' },
            { name: 'Lampu Neon', emoji: '💡', type: 'b3', info: 'Lampu pecah mengandung uap raksa yang berbahaya jika terhirup.' },
            { name: 'Botol Semprot', emoji: '💨', type: 'b3', info: 'Limbah B3 (Bahan Berbahaya Beracun) memerlukan penanganan khusus, bukan dibuang sembarang.' },
            { name: 'Obat Kedaluwarsa', emoji: '💊', type: 'b3', info: 'Jangan buang obat ke wastafel karena bisa mencemari sumber air tanah.' }
        ];

        function createWaste() {
            if (score >= targetScore) return;

            const randomWaste = wasteTypes[Math.floor(Math.random() * wasteTypes.length)];
            const item = document.createElement('div');
            item.className = 'waste-item floating';
            item.innerHTML = randomWaste.emoji;
            item.dataset.type = randomWaste.type;
            item.dataset.info = randomWaste.info;

            // Posisi acak di bagian atas layar
            const startX = Math.random() * (window.innerWidth - 100) + 50;
            item.style.left = startX + 'px';
            item.style.top = '-100px';

            gameArea.appendChild(item);

            // Animasi turun
            let pos = -100;
            const speed = 1.5 + (score / 40); // Kecepatan bertambah seiring skor
            
            const fallInterval = setInterval(() => {
                if (score >= targetScore) {
                    clearInterval(fallInterval);
                    item.remove();
                    return;
                }

                pos += speed;
                item.style.top = pos + 'px';

                // Jika jatuh ke bawah tanpa dipilah
                if (pos > window.innerHeight) {
                    clearInterval(fallInterval);
                    item.remove();
                    createWaste(); // Munculkan yang baru
                }
            }, 20);

            // Drag and Drop Logic
            let isDragging = false;
            let currentX, currentY, initialX, initialY;

            item.addEventListener('touchstart', dragStart, {passive: false});
            item.addEventListener('mousedown', dragStart);

            function dragStart(e) {
                isDragging = true;
                item.classList.remove('floating');
                clearInterval(fallInterval);
                
                if (e.type === "touchstart") {
                    initialX = e.touches[0].clientX - item.offsetLeft;
                    initialY = e.touches[0].clientY - item.offsetTop;
                } else {
                    initialX = e.clientX - item.offsetLeft;
                    initialY = e.clientY - item.offsetTop;
                }
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, {passive: false});
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchend', dragEnd);
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();

                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                item.style.left = currentX + 'px';
                item.style.top = currentY + 'px';
            }

            function dragEnd() {
                isDragging = false;
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);

                // Cek tabrakan dengan tong sampah
                const bins = document.querySelectorAll('.bin');
                let caught = false;

                bins.forEach(bin => {
                    const bRect = bin.getBoundingClientRect();
                    const iRect = item.getBoundingClientRect();

                    if (
                        iRect.left < bRect.right &&
                        iRect.right > bRect.left &&
                        iRect.top < bRect.bottom &&
                        iRect.bottom > bRect.top
                    ) {
                        if (bin.dataset.type === item.dataset.type) {
                            handleCorrect(bin, item);
                            caught = true;
                        } else {
                            handleWrong(bin, item);
                            caught = true;
                        }
                    }
                });

                if (!caught) {
                    // Jika dilepas tidak di tong, biarkan jatuh lagi
                    item.classList.add('floating');
                    // (Logika jatuh bisa dilanjutkan di sini, tapi untuk simpel kita hapus & buat baru)
                    item.remove();
                    createWaste();
                }
            }
        }

        function handleCorrect(bin, item) {
            score += 10;
            if (score > targetScore) score = targetScore;
            
            updateUI();
            createParticles(item.offsetLeft + 35, item.offsetTop + 35, '#22c55e');
            showFact(item.dataset.info);
            
            item.remove();
            
            if (score >= targetScore) {
                endGame();
            } else {
                setTimeout(createWaste, 500);
            }
        }

        function handleWrong(bin, item) {
            score = Math.max(0, score - 5);
            updateUI();
            createParticles(item.offsetLeft + 35, item.offsetTop + 35, '#ef4444');
            
            // Getaran tong jika salah
            bin.style.transform = 'translateX(10px)';
            setTimeout(() => bin.style.transform = 'translateX(-10px)', 50);
            setTimeout(() => bin.style.transform = 'translateX(0)', 100);

            item.remove();
            setTimeout(createWaste, 500);
        }

        function updateUI() {
            scoreEl.innerText = score;
            progressFill.style.width = (score / targetScore * 100) + '%';
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = '10px';
                p.style.height = '10px';
                p.style.background = color;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 50;
                p.style.setProperty('--x', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--y', Math.sin(angle) * dist + 'px');
                
                gameArea.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function showFact(text) {
            const notifBody = document.getElementById('notif-body');
            notifBody.innerText = text;
            notification.classList.add('active');
            
            setTimeout(() => {
                notification.classList.remove('active');
            }, 4000);
        }

        function endGame() {
            gameOverScreen.style.display = 'flex';
        }

        // Mulai Game
        window.onload = () => {
            createWaste();
        };
    </script>
</body>
</html>
